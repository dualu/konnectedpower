<div class="card" style="margin-bottom: 30px; background: #f8fafc; padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px;">
    <h3 style="margin-top: 0; color: #1e3a8a; font-size: 16px; margin-bottom: 5px;">📅 View Monthly Performance Metrics</h3>
    <p style="color: #64748b; font-size: 13px; margin-bottom: 20px; margin-top: 0;">Select a target month. The system will filter the production logs and adjust the data window automatically.</p>
    
    <form method="GET" action="{{ url_for('analytics') }}" style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
        
        <div style="display: flex; flex-direction: column; gap: 5px; min-width: 240px;">
            <label style="font-weight: bold; font-size: 13px; color: #475569;">Target Month Matrix:</label>
            <input type="month" name="target_month" value="{{ target_month }}" required 
                   style="width: 100%; padding: 9px; border: 1px solid #cbd5e1; border-radius: 6px; background: white; font-size: 14px; height: 18px;">
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" style="background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; height: 38px;">
                🔄 Update Target View
            </button>
            <a href="{{ url_for('analytics') }}" style="background: #64748b; color: white; text-decoration: none; padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: bold; display: inline-block; line-height: 18px; height: 18px;">
                Reset
            </a>
        </div>
    </form>
</div>
<div class="charts-wrapper" style="padding: 20px;">
    <!-- Graph 1: L/hr -->
    <div style="height: 400px; margin-bottom: 50px;">
        <canvas id="lHrChart"></canvas>
    </div>
    <!-- Graph 2: L/kWh -->
    <div style="height: 400px;">
        <canvas id="lKwhChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>console.log("Data received from Python:", {{ data | tojson }});</script>
<script>
    // Inject the Python data into JavaScript
    const chartData = {{ data | tojson }};
    const days = {{ days | tojson }};

    function createCharts() {
        const genIds = Object.keys(chartData);
        
        // Helper to generate datasets for all 6 gens
        const getDatasets = (key) => genIds.map(gen => ({
            label: gen,
            data: chartData[gen][key],
            tension: 0.1
        }));

        // Render L/hr Chart
        new Chart(document.getElementById('lHrChart'), {
            type: 'line',
            data: { labels: days, datasets: getDatasets('l_hr') },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Fuel Consumption (L/hr)' } } }
        });

        // Render L/kWh Chart
        new Chart(document.getElementById('lKwhChart'), {
            type: 'line',
            data: { labels: days, datasets: getDatasets('l_kwh') },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Efficiency (L/kWh)' } } }
        });
    }

    createCharts();
</script>
