<!DOCTYPE html>
<html>
<style>
    /* Force mobile layout overrides */
    @media (max-width: 768px) {
        .main-wrapper { flex-direction: column !important; }
        .sidebar { width: 100% !important; height: auto !important; }
        .hamburger-menu { display: block !important; } /* Force display */
        
        .nav-links { display: none !important; } /* Hidden by default */
        .nav-links.active { display: flex !important; flex-direction: column !important; }
    }
</style>
<body>
    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 10px; padding: 15px;">
                <img src="{{ url_for('static', filename='company_logo.png') }}" 
                     alt="Logo" style="width: 32px; height: 32px; object-fit: contain;">
                <h3 style="margin: 0; font-size: 1.2rem; white-space: nowrap;">Konnected Liberia</h3>
                <!-- Hamburger Icon -->
                <div class="hamburger-menu" onclick="toggleSidebar()" style="display: none; margin-left: auto;">☰</div>
            </div>
            
            <ul class="nav-links" id="sidebarNav">
                <li><a href="/admin">⚙️ System Admin</a></li>
                <li><a href="/supervisor">🔍 Supervisor Logs</a></li>
                <li><a href="/operator">📄 Operator Terminal</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="/logout" class="logout-btn">🚪 Logout</a>
            </div>
        </aside>
        
        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
    function toggleSidebar() {
        console.log("Hamburger clicked"); // Check your console to see if this appears
        const nav = document.getElementById('sidebarNav');
        if (nav.style.display === "none" || nav.style.display === "") {
            nav.style.display = "flex";
            nav.classList.add('active');
        } else {
            nav.style.display = "none";
            nav.classList.remove('active');
        }
    }
</script>
</body>
</html>
