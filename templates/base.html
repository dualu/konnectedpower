<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Hamburger Logic for mobile */
        .hamburger-menu { display: none; cursor: pointer; padding: 15px; font-size: 24px; color: #475569; }
        
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { width: 100% !important; }
            .hamburger-menu { display: block !important; }
            .nav-links { display: none; }
            .nav-links.active { display: block; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 10px; padding: 15px;">
                <img src="{{ url_for('static', filename='company_logo.png') }}" 
                     alt="Logo" style="width: 32px; height: 32px; object-fit: contain;">
                <h3 style="margin: 0; font-size: 1.2rem; white-space: nowrap;">Konnected Liberia</h3>
                <div class="hamburger-menu" onclick="toggleSidebar()">☰</div>
            </div>
            
            <ul class="nav-links" id="sidebarNav">
                <li><a href="/admin">⚙️ System Admin</a></li>
                <li><a href="/supervisor">🔍 Supervisor Logs</a></li>
                <li><a href="/operator">📄 Operator Terminal</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="/logout" class="logout-btn">🚪 Logout</a>
            </div>
        </aside>
        
        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.classList.toggle('active');
        }
    </script>
</body>
</html>
